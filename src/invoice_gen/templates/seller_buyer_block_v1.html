<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: "DejaVu Sans Pinned";
    src: url("fonts/DejaVuSans.ttf") format("truetype");
    font-weight: normal;
  }
  @font-face {
    font-family: "DejaVu Sans Pinned";
    src: url("fonts/DejaVuSans-Bold.ttf") format("truetype");
    font-weight: bold;
  }
  @page { size: A4; margin: 20mm; }
  body {
    font-family: "DejaVu Sans Pinned", sans-serif;
    font-size: 10pt;
    color: #000;
  }
  .header { margin: 0 0 8mm 0; }
  .header p { margin: 0 0 1mm 0; }
  .row { display: flex; gap: 20mm; }
  .col { flex: 1; }
  h2 { font-size: 11pt; margin: 0 0 4mm 0; }
  .label { font-weight: bold; }
  p { margin: 0 0 1mm 0; }
</style>
</head>
<body>
  <div class="header">
    <p>Numer: __INVOICE_NUMBER__</p>
    <p>Wystawiono: __ISSUE_DATE__</p>
    <p>Sprzedano: __SALE_DATE__</p>
    <p>Waluta: __CURRENCY__</p>
  </div>
  <div class="row">
    <div class="col">
      <h2>Sprzedawca</h2>
      <p class="label">__SELLER_NAME__</p>
      <p>NIP: __SELLER_NIP__</p>
      <p>__SELLER_ADDR1__</p>
      <p>__SELLER_ADDR2__</p>
    </div>
    <div class="col">
      <h2>Nabywca</h2>
      <p class="label">__BUYER_NAME__</p>
      <p>NIP: __BUYER_NIP__</p>
      <p>__BUYER_ADDR1__</p>
      <p>__BUYER_ADDR2__</p>
    </div>
  </div>
</body>
</html>
